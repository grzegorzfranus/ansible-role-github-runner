---
# =============================================================================
# Ansible Role: GitHub Runner - Main Tasks
# =============================================================================
# This is the main task file for the GitHub Runner role. It orchestrates the
# execution of all role components in the correct order. Each task is tagged
# appropriately to allow for selective execution.
#
# Flow:
#   1.  OS-Specific Variables         - load distro/family-specific vars
#   2.  Variable Validation           - assert all required vars are valid
#   3.  System Prerequisites          - verify resources, install dependencies
#   4.  User Management               - create dedicated user, group, SSH keys
#   5.  Package Installation          - download, extract, set permissions
#   6.  Logging Configuration         - rsyslog, logrotate, journald overrides
#   7.  Runner Configuration          - register runner with GitHub API
#   8.  Service Management            - systemd unit, enable, start
#   9.  Installation Verification     - end-to-end health check
#  10.  Uninstall Flow                - remove runner when state=absent
# =============================================================================

# -----------------------------------------------------------------------------
# 1. OS-Specific Variables
# -----------------------------------------------------------------------------
- name: GitHub Runner | include_vars | Gather OS specific variables
  ansible.builtin.include_vars: "{{ lookup('first_found', params) }}"
  vars:
    params:
      files:
        - "{{ ansible_facts['distribution'] | lower }}_{{ ansible_facts['distribution_version'] | lower }}.yml"
        - "{{ ansible_facts['distribution'] | lower }}_{{ ansible_facts['distribution_major_version'] | lower }}.yml"
        - "{{ ansible_facts['distribution'] | lower }}.yml"
        - "{{ ansible_facts['os_family'] | lower }}_{{ ansible_facts['distribution_version'] | lower }}.yml"
        - "{{ ansible_facts['os_family'] | lower }}_{{ ansible_facts['distribution_major_version'].split('.')[0] }}.yml"
        - "{{ ansible_facts['os_family'] | lower }}.yml"
        - "main.yml"
      paths:
        - "{{ role_path }}/vars"
  tags:
    - always
    - setup
    - init

# -----------------------------------------------------------------------------
# 2. Variable Validation
# -----------------------------------------------------------------------------
- name: GitHub Runner | assert | Validate role variables and requirements
  ansible.builtin.include_tasks: assert.yml
  run_once: true
  tags:
    - always
    - validate
    - check

# -----------------------------------------------------------------------------
# 3. System Prerequisites
# -----------------------------------------------------------------------------
- name: GitHub Runner | prerequisites | Verify system prerequisites
  ansible.builtin.include_tasks: prerequisites.yml
  when: >
    github_runner_role_action in ['all', 'prerequisites'] and
    github_runner_enabled | default(true)
  tags:
    - setup
    - prerequisites

# -----------------------------------------------------------------------------
# 4. Single-Instance / Multi-Instance Execution Branch
# -----------------------------------------------------------------------------

# Snapshot original variable values before multi-instance loop.
# Without this, set_fact in instance.yml permanently overwrites variables
# during iteration 1, causing iteration 2+ to read already-modified values
# (e.g. /opt/actions-runner-01 -> /opt/actions-runner-01-02).
- name: GitHub Runner | playbook | Snapshot base variables for multi-instance loop
  ansible.builtin.set_fact:
    _base_install_dir: "{{ github_runner_install_dir }}"
    _base_work_dir: "{{ github_runner_work_dir }}"
    _base_labels: "{{ github_runner_labels }}"
    _base_group: "{{ github_runner_group }}"
    _base_ephemeral: "{{ github_runner_ephemeral }}"
    _base_service_limits: "{{ github_runner_service_limits }}"
  when: >
    (github_runner_instances | default([])) | length > 0
  tags:
    - setup
    - multi_instance

- name: GitHub Runner | playbook | Single-runner execution mode
  ansible.builtin.include_tasks: instance.yml
  when: >
    (github_runner_instances | default([])) | length == 0
  tags:
    - setup
    - single_instance

- name: GitHub Runner | playbook | Multi-runner execution mode
  ansible.builtin.include_tasks: instance.yml
  loop: "{{ github_runner_instances }}"
  loop_control:
    loop_var: _current_instance
    label: "{{ _current_instance.id }}"
  when: >
    (github_runner_instances | default([])) | length > 0
  tags:
    - setup
    - multi_instance
